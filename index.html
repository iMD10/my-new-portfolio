<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muhannad Alfawzan — AI, Data &amp; Software</title>
    <meta name="description" content="مهند الفوزان — خريج علوم حاسب. ذكاء اصطناعي، بيانات، وبرمجيات. Muhannad Alfawzan — Computer Science graduate working across AI, data, and software." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Instrument+Serif:ital@1&display=swap"
      rel="stylesheet"
    />
    <script>
      // Kick off the hero image download before the app bundle loads
      (function () {
        var theme = localStorage.getItem('theme')
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        var link = document.createElement('link')
        link.rel = 'preload'
        link.as = 'image'
        link.href = theme === 'dark' ? './hero-dark.jpg' : './hero-light.jpg'
        document.head.appendChild(link)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
